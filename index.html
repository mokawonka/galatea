<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galatea — The Writer's IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="logo">Galatea</div>
    <p class="tagline">The writer's workspace</p>

    <div class="login-box">
      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-enter" id="loginBtn" onclick="handleLogin()">Enter</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <p class="footer-note">Your manuscript awaits.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://yspinihkruvjmawqjqwb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcGluaWhrcnV2am1hd3FqcXdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Mzk2MjAsImV4cCI6MjA5NDUxNTYyMH0.yUx4PeOnO0xA_GOvx5l20mNXv1K5ynXfUX1KznHCY3s';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redirect if already logged in
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'ide.html';
    })();

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!email || !password) {
        err.textContent = 'Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entering…';
      err.textContent = '';

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        err.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Enter';
      } else {
        window.location.href = 'ide.html';
      }
    }
  </script>
</body>
</html>
